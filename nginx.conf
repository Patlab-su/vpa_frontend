server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ✅ บังคับให้ Nginx ส่งภาษาไทยแบบ UTF-8 (แก้ปัญหาตัวอักษร ?)
  charset utf-8;

  # ✅ อนุญาตให้อัปโหลดไฟล์ได้สูงสุด 20MB (รองรับรูปภาพไซต์งาน)
  client_max_body_size 20M;

  # 🔹 serve frontend build
  location / {
    # เพิ่มการบังคับประเภทไฟล์เพื่อให้มั่นใจว่า Browser จะไม่อ่านผิด
    include /etc/nginx/mime.types;
    try_files $uri /index.html;
  }

  # 🔹 proxy API → backend
  location /api {
    proxy_pass http://vpa_backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # เพิ่ม charset สำหรับ API response เผื่อไว้
    proxy_hide_header Content-Type;
    add_header Content-Type 'application/json; charset=utf-8';
  }

  # 🔹 proxy uploads → backend
  location /uploads {
    proxy_pass http://vpa_backend:3000;
  }
}